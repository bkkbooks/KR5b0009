front:
  text: 太上洞玄靈寶智慧定志通微經人九爾時靈寶天尊靜處玄都元陽七寶紫微宫恬神玄漠寂然無為時紫微宫中中外光明映照無量百和寶香不燒自熏香光纒會衝溢虛空飄飄流流散注無窮飾光遐鬱柔濡清涼清涼竒雅非可演銘天鈞大樂萬種互作天尊俄然初不顧眄思念萬兆造化之始胎稟是同各因氤氲之氣凝而成神神本澄清湛然無雜既授納有形形染六情六情一染動之弊穢惑於所見昧於所著世務因緣以次而發招引罪垢歷世彌積輪回於三界飄浪而忘反流轉於五道長淪而弗悟嬰抱痛毒不能自知馳神惶悸唯罪是履愍之在心良無巳矣億其稟受之始理有可哀即遣侍臣召左玄真人右玄真人須臾二真人立便躬到稽首禮畢依位而坐侍座良久言宴粗悉於是天尊曰所以相屈之意正欲及之吾向思念億兆源起如是如是之理猶可拯濟卿等二賢巳發大慈大悲亦當同斯趣耶二真人答曰衆兆塗炭常於所邑並各巳作委曲教化具説罪福於理造極猶有強梁愚癡之人永自不信縱有微信當時録伏不經旬朔巳復懈怠蓋亦天尊髙鑒所簡當如之何天尊曰其雖懈怠當時一信福巳不輕二賢巳植此功宜奬之焉二真曰不審復應何方必令其悟天尊答曰此輩冥昧示以廣途文多事碎智所不堪智所不堪致生懈怠心今欲旨以簡文要事的以示之當不同也二真於是下座稽首天尊不審何事簡要可以開悟天尊曰卿並還坐吾欲以思微定志旨訣告之其要簡易從易得悟不亦快乎二真曰思微定志為有經耶天尊曰都無文字二真曰斯徒觸壁無底大癡如無文字何從得悟天尊答曰即時一切經書本有文字耶今日之言不亦經乎二真曰唯乞願聞輒當書述天尊曰譬如有人或千或萬欲得珍寶聞海中大有便各各裝治或舫或船千艘百艘泛於大海或千里萬里或近或逺有洲嶼百千島亦無數或左水中甚多珍寶乃至無量七寶精光光皆衝天色色各異同泛船伴如許多人及風當發無識光者為爾且發罔知何向天尊又曰此諸船伴可得寶乎二真曰其無導師盡無先知處又不識寶光為爾周章此行甚難方當處處悉到到悉發掘或於水中用力億倍或可果耳天尊曰學道之人不得思微定志要訣如此諸人不識寶光而欲求寶可愍如何天尊又曰如此衆中忽有一人善識寶光寶光衝大萬里遙見如看掌中諸人雖多悉不能見善見光者舉帆先去衆船隨之徑至寶所悉皆大得七寶名珍各各滿載還至本處衆伴議曰賴有導師今當報德於是船船斂寶價直億千義以答恩其寧快乎二真曰何利若斯天尊曰學道之人得此思微定志要訣其正如是識寶光人天尊又曰往古久逺無數劫時天王運盡應更攺人天下綬信有得之者便為天子時善相師見一山上有此綬光當是其夜天雨大驟火炬不立光耀暗中而人不見師於衆中語村人曰天下天子綬信在此山中村人聞之皆各潛往暗不能得學無思微定志如彼暗行人也時相師聞人看綬不得自往看之往便即得遂登天位人若得此思微定志志意便定求道審諦如彼相師善寶之焉勿得輕泄輕泄之者彼我獲罪罪在難原所以爾者非但輕經乃輕道也受學之人愼之愼之二真聞説欣踊無量中表相應唯無願聞天尊曰故欲相告豈得為隱便曰要訣當知三界之中三世皆空知三世空雖有我身皆應歸空明歸空理便能忘身能忘身者豈復愛身身既不愛便能一切都無所愛唯道是愛能愛道者道亦愛之得道愛者始是反真思微定志理盡於斯斯則反乎兩半成一本之一還歸真道業日升吾等不亦無復憂勞耶天尊又曰兩半成一其義有五卿等知乎二真答曰巳知不亦於彼清虛之氣因氤氲之交分半下降就此四半合為一耶不亦或此假一而為惡者致招自然之氣淪於三塗乎不亦為善離此四半還登太虛復我清虛之氣反我兩半處於自然乎天尊曰卿體之矣今便以兩半輪轉圖局相示於空中下左真之前
