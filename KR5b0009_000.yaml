body:
  text: 兩半圖局如左一名思微定志真劵法用金錢二萬四千上金五兩五綵紋中各一段素絲五兩五方紋繒各一匹明鏡一靣本命紋繒歲計餘一金鈕一雙凡如千種授者得信當分明計十二折傳傳不理盡便違科罪增四倍受者法信不充而不意氣卑足亦得罪罪與違科傳同寒樓道士不論上清弟子某甲齎信如法奉受要訣當志心拔還半反上不至枉魂飲丹盡一為信二真曰此實簡要始蒙開明乃有如此之妙旨而早不悟不勝天尊成濟之恩銜荷而已豈是今日卑辭可謝天尊曰雖得此訣當以十戒為本授兩半訣畢次度十戒度十戒法法師居南弟子向師三禮畢請曰願見成就授以十戒當終身奉行誓敢有違於是長跪心存見十方大聖在於上方乃稽首諦受法師燒香便為説戒一者不殺當念衆生二者不淫犯人婦女三者不盜取非義財四者不欺善惡反論五者不醉常思淨行六者宗親和睦無有非親七者見人善事心助歡喜八者見人有憂助為作福九者彼來加我志在不報十者一切未得道我不有望是為十戒受者並云弟子某甲受終身奉修又禮師都畢天尊曰能受是十戒修行如法十方天官無不衛護必致得道子若逼世纍不盡心十者九八七六乃至於五擇其能者然五戒之福福亦難稱子其廣勸衆兆垢重聞或不喜猶不一二羅縷委曲開悟如復懈怠日趣長苦由其罪深夫可如何二真曰如有善人志欲勤修斯事幸間復有何事求道益速天尊曰普教科儀隱在三籙三元品戒三籙乃衆經之端已出于世亦當相降也二真曰三籙為是金籙玉籙黃籙耶天尊曰然然此並為形外之教思微定志之至理務知三元妙覺無二有道有地獄祈請七玄苦兼度未見者當爾之時上方空中有人誦曰此法實玄妙免汝九祖役是其人不授令人與道隔非人而趣授見世被考責死墮三塗苦萬劫悔無益所以空中作此頌者恐愚人得經便爾賤之或以借寫或舉本乞人令有心之人施信無所法橋路斷是故爾耳益宜愼之益宜愼之時二真人意中咸云此要訣炳灼聞即玄悟前後冗冗了不開發為是何物於是天尊知二真意報曰二賢卿等知不一切善惡皆有因緣應從吾受是故爾耳當相為説便可靜聽往昔過去恆沙之數信不可計無極久逺劫時有賢信道民姓樂名淨信居業巨富財不可計甚信道德靜處思惟心與口誓我富如此此皆福來銜荷天地甚宜報恩報恩之心實有𡨋到然未知何方從外寢處還問其妻具説如此道不須財今當云何妻曰道從心生何處覓道但當營始道士諸所乏無道士得已齋戒興顯道事豈非報道夫得妻言然之為佳心開覺悟時彼山南有一道士長齋居山恆誦經句去淨信家二百餘里淨信久聞此人亦常依依即語妻曰我當往彼問其所乏當隨之供足須令盈餘不使竭少亦當且送薄餉妻曰能爾真是佳理閉眼之日猶有所怙如不如此身死神斃求哀無所津信即開料雜庫出好名香細布白㲲吉貝綿絹之類卧具氈帳乃及玩弄服飾之物金銀銅器皆精好者及諸雜藥事事種種捨十丁奴整作十簷詣道士所言語粗悉及所發起今齎薄餉奉上道士并以十奴長給灑掃道士從今以去有所乏須可分遣奴還隨命奉給道民幸甚勿得疑難道士為受淨信别去還家語其妻具説如此妻聞道士已受夫妻歡喜喜不自勝自今以去便以為常如此少時淨信夫妻命日欲終都有一兒兒名法解時年十七侍父母疾父毋臨終語其兒曰我得此豐有資財無量皆從道來誓欲報道罔極之恩道不須財唯當供養道士吾比來入山諸所營為是汝所見今家財産足汝施用汝其勿廢法解銜淚嗚咽煩𡨚懊惱悲哭喚天一頓一伏氣絶復蘇手抱父母而啼又曰阿爺阿婆發如此之福臨命將終善尚不退天道雖逺豈當不感唯願即升福堂位至髙尊兒後壽終必得相見俱在道位耳於是父母命絶法解長呌氣絶于時久久乃蘇由其父母子合門心行和吉雖以道士為先亦傍救親族鄉里逺近皆蒙惠潤當爾之日是親非親不避逺近皆往奔赴及家僮役亦復甚多見法解與父母長設孝心徹靈誓願如此舉衆無不自相顧視人人流涕不能自止吉人如斯命盡如何法解於後敬向道心亦是天然加奉尊命供養道士拯救貧乏給恤行旅逮及衆生數百倍先外無毫入用度唯廣遂至於貧餉恤道士向欲不連道士轉老他無得處每日燒香憶此主人供養我輩遂至於貧唯願天道領其丹心我今老悴何以報之道士常以月末一日六時行道恆自感憶法解在心是故遣信要呼法解語信曰汝頓首主人尅此月末依常一日六時行道無復所須可來見就共作功德福雖悠悠亦不宜廢法解得信欣喜答曰為法解稽首道士承至日齋輒當奉命信去之後計校家中諸食諸倉諸庫悉皆空罄無可齎持憶父遺教愈增悲感訪賣屋宅屋宅髙廣非中士可居唯宜天王天王復自有宫第或又云此宅勢盡或且云凶了無買者乃欲自賣恐身屬他人永不得復入山見我道士法解夫妻與二男為居大者胤祖年十一小者次胤私名阿奴始涉八歲並姿容端正絶世無倫吐納誦詠聲有玉響行步舉止德味有餘年雖幼稚並加勤修答對逺近禮敬親踈書晝言辭每在人表其姨大富都無男嗣恆樂此兒兄弟大小無在唯願得一能與我者雇錢百萬貪兒佳故不計錢多法解忽悟還問妻曰憶昔曽聞卿姊樂吾一兒今欲爾耶妻未知問意即趣答曰寧當俱死何有以如此之子去眼前理賣兒欲以自活復增愁思故是死耳了無此理夫曰我賣兒意不以供口亦不供身妻曰欲以何施夫曰道士在山供養轉闕卿昔聞我奉先君遺教為忘之耶妻即拭淚跪而答曰今雖窮弊實亦在心若如是者福德之事蓋亦先君遺教安可不爾妻曰法用頗廢便當將兒往報姊也母子臨發兒跪父别因啓父曰便當違逺膝下眷戀何極願爺行止時過見視天性內發相抱俱哭阿奴阿爺感徹天地胤祖抱其弟頭號哭良久曰福德之事我亦當不久非言可盡父見其兄弟如此心亦罔已恐其妻悔即語妻曰即今且將往就其姨質十萬錢作月日期冀望宅售必得兒還若至期不贖當長與姨也所以爾者不忍便别以自寬耳於是割情母子即路母至姊所具説質兒意姊得聞之歡喜無量乃與見錢整五十萬遣車三乘載妹及錢送還妹家次胤跪母辭曰父作如此功德後必得道未果之間願婆爺行止時過見視次胤至欲慰其姨意抑忍不啼及母垂臨上車違逺在近母子恩情非可強割雖不號呌母子及姨三人相與雨淚百行於是次胤跪姨啓曰今為姨兒何異所生但凡人分離猶尚罔罔願姨見恕今欲乞一萬錢以與父别寄婆車去姨愍此小兒情趣乃爾愈加矜敬即又料出見錢十萬曰以此與子意可與者恣意與之次胤跪曰賜錢太多即啓母言以六萬奉阿爺阿婆此是奴心以供養二尊朝夕之資蓋亦微微願以自供必不他用以二萬奉兄願勤加供養時復見憶餘有二萬寄奉山中道士願我父母兄弟及我阿姨常與福會所以不道共會又及姨福會者心恐觸忤姨意故也母歸至家憶兒兄弟甚相珍重食息嬉戲及其出入未曽不同得一異味輒相分與終不獨噉一旦分别我今獨反為福故也胤祖在後甚懷憂思聞母大得錢還知弟不歸拭淚掩手跪問母曰婆與奴别奴啼若如母欲割其思欺曰不啼姨常念沙兄弟得之歡喜抱不離膝餵以衆果笑與吾别寄汝錢耳胤祖知其必啼婆誘祖耳其眠好與祖俱今獨在彼恍恍未習亦當思戀阿爺及憶阿祖且新與婆别那得不啼因而歎曰兄弟二人忽爾生離父母為道故道當見念必使彼此各強健耳言之噓唏淚下覆靣併氣嗚咽不能自止法解於是市供齋具并更大餉道士道士驚問那復得此法解不敢上欺具如事答道士不言相與共齋齋竟法解辭退至家忽見諸雜倉庫金庫銀庫寶珠玉庫錢庫絹庫絲綿布庫綾羅錦綺繒綵等庫米倉鹽食五榖諸倉悉皆盈滿問其妻曰官寄此耶妻曰不也忽見此耳夫妻一怖一喜或恐是夢想或是天恤不自寧安法解復入山中請問道士具白如是道士答曰貧道昨夜下講於卧中得夢見有一人持一真材如意授以與卿卿即受之貧道思惟謂是佳瑞然不敢學恐事未應同齋之人謂我嗊嗃今果如此此是天恤人豈敢奪且卿敬信彰於玄逺足以招此殆不須疑但用無嫌法解曰猶欲白王令知其可爾乎道士曰善法解白王王即答云卿精進出世天那不感此是天恤人豈敢奪但用勿恐於我無嫌法解還家語其妻兒具説如是王與道士異口同音此真天恤益加篤信遂相承繼福祚永𨺼無復極已於是天尊問二真曰卿等識此三世人耶二真對曰此事久逺實所不識天尊曰時樂淨信者吾今身是法解者左玄真人是法解妻者右玄真人是卿等頗憶往古鞠育之恩乎致有今日更相開悟亦其由也二真人聞教方始開悟雖憶此事領然無昧然亦悠悠其為久逺言語未畢忽有八色雲軿二人共乘侍從仙童玉女作鈞天大樂從東南上來不通徑前前即稽首天尊轉拜二真二真方悟是二息乎今中候太夫人將非天尊往古夫人乎即先親也展此座畢當往拜覲天尊曰然子知之乎二真曰能賣兒供法亦為苦乎天尊曰夫如此輩有何限量或賣身供法或身投餓虎或割肉飴禽或殺身施蟲或質致妻子或以頭施人諸如此例終劫説之亦不可盡説亦無窮所以者何一切是輩並是得道真人共作視見勸化愚蒙身不復痛了見人理或是幻作蓋亦無竒所以指説胤祖次胤兄弟父祖三世六人者其時並是凡人而能如此真為少比是故説耳二真曰實如教旨二真得經衆訣之要各各慶恱意自云曰如此一切微有緣者必當樂受於是啓天尊曰如今還外傳説此經不審科儀法信輕重謹以上咨天尊曰脫未體備甚宜應問所以爾者大有旨要玄科隱祕故不一二載説之耳子並諦聽善識此禁最嚴愼勿差違天尊於是告右玄真人曰卿受此經可擇其人傳不須法信又告左玄真人曰卿受此經當依𡨋典法信所用金錢紋繒等物皆令如式此法出自虛無浩素元君之凝思五方元老常所寶修受者别齎上金五分素絲五兩以𧵥五方元老之靈本命紋繒上壽百二十歲計歲餘一公王一匹中人一丈貧者一尺此三種物愼不可闕闕而強受受者有罪其中增降以貧富量之左玄真人心疑不平因白天尊曰右玄真人受此經文不須信物而反見使頓責如許經法是同即有二異其可解乎天尊曰非為偏也子未知乎衆兆不同心心各異故開二塗其歸一也所以爾者右玄弟子桑門居士居士普行乞求破惡以為法橋能有施者福報萬倍故令授經不重責信卿今弟子縱使分衛以乞求度人人無與者更益彼罪信心無表何由得度今故制以法信法信之報報在無量如經無盡不妨右玄布施福也天尊又曰右玄弟子施居士者是能減割施財與人福報萬倍萬倍有盡左玄弟子齎信受經此為信道則是施財於道是故福報如經無盡左玄真人雖奉教旨心猶未體福報如經無盡之理理復云何天尊知其心念即語大賢卿有疑耶無所嫌也所以云福報如經無盡也何以故譬卿得此經寫治一通傳與一人十人百人千萬人千億萬人不可計人人寫一通一通無限量通彌布無外卿本猶存法信之報如此無盡假令卿今以一金萬金從師受經後得福報如經無盡隨復永無耗竭恐弟子中脫有未悟為近譬耳夫經信之報隨信多少悉如良井縱使天下大旱百丈絶源此井猶滿井主足用餘以施人百千萬人舉鄉郭人恣意汲取給拯無極終於無竭此是自然不盡之報天尊曰既能信道用信道故故能信經減損身口以用受經財報無盡故謂無量加得信道之福信道之福令人精神聰明智慧如經無盡譬然一燈轉然百燈千燈萬燈巨億萬燈無量數燈普照虛空先所然一燈光明無損此是福報智慧永無盡也卿當普告受經之人導以智慧開悟一切如此井燈不得獨足便自為足左玄真人心又疑曰悉天下大旱百丈無源井那猶滿欲問未敢天尊已知左玄之意即又語曰所以名為良井者也是時虛空之中衆仙大聖聽説法者巨億千萬咸皆開解同聲稱善一稱善福福足三皆左玄真人疑解廓然知責經信更是勝理下座稽首曰始蒙開悟是時共乘雲軿二人乃是往古胤祖次胤兄弟聞説要言即以仙童玉女千二百人稽首奉上左玄真人求受要訣左玄真人即授二人思微定志要訣二人信解即入第三仙品是時千二百仙童玉女見二人受經得道便各解身上寶珠瓔珞奉上左玄真人求受尊經受之亦竟讀棏一遍神開解悟知三界皆空福盡應終便各悔過千二百人即於其身仍化入仙爾時空中有一天人意疑天尊説此譬喻云學道之人不得思微定志要經如人海採寶無有導師又云如彼愚人暗人空山覓天子綬設如是者造化之𥘉未有此經故天尊大聖那得成道作是念已天尊即知便答天人曰卿未預天人豈能逺知造化之由如天尊大聖經法未出而得道者皆是純朴行應自然自然之行暗與理合䁆與理合自然玄悟玄悟之理本無文字撰集成經以告後來何所嫌耶譬人墮地獄豈須先作地獄法乎天人稱善曰聖尊之言悟我愚蒙於是悔謝進仙一階時有十二年少處世間樂日日相就共作好食酣飲嬉戲或復論議為道之難易天尊以道眼遙見此人前生在世得為人師而祕吝經典故弟子於道之心亦復猶豫因此微緣緣猶可度於是天尊即化作凡人從會中過過託乞食因悉共語諸年少輩復論如故一人曰我數隨家兄至安樂山中見諸道士悉持十戒肅肅甚佳如此後死魂神所在亦當不虛但十戒持人難悉從耳化人曰持此甚易違此難耳諸人聞化人言皆各僉然問化人曰云何先生持戒云易不持反難化人曰立身如戒不畏天子亦不畏鬼神何為不易如違戒者是人悉畏復畏鬼神云何不難於是十二年少並有道意因各各自忖其中一人素性好酒先曰餘者乃可唯酒難斷除我本性所好作不敢計所以者何我先服散散發之日非酒不解是故敢耳化人曰散發所須此乃是藥將養四大藥酒可通但勿過量至不如平耳一人曰餘事猶可妄語甚難所以為難或身有密事或是尊長應為隱諱而人見問不得不欺欺便犯戒是故為難化人曰事有隱顯言有方便此亦可通但勿善惡反論説人之短言傷人耳一人曰餘者乃可唯盜戒難小小之間已是犯目化人曰大事可難小小之間不益易愼乎即為説偈曰何不受盜戒不受盜亦難孰云暗中昧中有記盜官取一年年倍倍倍殊不寬以手捧洋銅燒口煮心肝一朝言此苦終年猶心酸何不受此戒保持必令完我信彼亦信在在無不安安坐招靈人永享長年歡一人曰餘者悉易淫最難斷所以爾者我曽履斯事數隨兄中食當中食時謂云一日精進無不過理亦謂後死必當得此齋戒之福至是夕夜是我所愍輒來狡獪雖苦加抑迮不覺已爾每每如此是故最難化人曰色者令是想耳想悉是空何有色耶但先自觀身知身無竒便知無色何可不忍且淫欲頗恣如飲鹹水飲多渴多唯死而已何有厭足於是化人而説偈曰色欲劇於渴小忍差可度何為進鹹水水鹹益渴固子能善解渴當飲天甘露甘露香且薰通體皆流布天人尋香降玄趣自然悟熙熙永無為長保九天祚其一人曰餘悉可從唯殺生戒難我性好噉雞一食無肉了自無味數日便瘦化人曰賢者肥為人患瘦益體輕用肥何為即説偈曰賢者戒其殺亦莫懷殺想衆生雖微微亦悉樂生長如何害彼命而用以自養自養今一時纍汝自然爽長淪三塗中辛苦還復生善惡各有緣譬如呼有響何不改此行慈心以自獎真人携手遊逍遙觀浮量説此偈已化人見大威變極道之姿侍從僚屬鈞天大樂非可目名反于上方諸人悉見喜懼交集并聞要説意解開悟悉俱共詣左玄真人求得奉受經法并諸十戒真人亦以道眼見此諸人先世因緣致其難悟之由枉屈天尊下降多方開悟故作建故不以授之以其有緣不得都斷唯語明日當相授也明日明日無復極已諸年少輩自共語曰我等命日難保不可為復如前明日明日也當各齎法信并辭便當更共苦請相黠言曰叩頭自搏血出斛數亦要莫止左真慈心必授我等辭曰男生某甲等叩頭乞道自摶今日之日流映已差恆恐微氣奄同彼昧昧而無曉長夜難即孤爽困苦求免無所伏聞天尊所演思微定志有十戒之法文簡事要無細不度寅人專專實仰希奉受朝受夕沒永無遺恨若復遷延日過一日朝菌殘命未知明日吉凶何如如此妙趣萬代始出會遇有今今復差違譬盲人捉雀入手復去雖復萬劫豈可重遭輒自罄竭辦信如法條牒如左謹重稽顙奉辭以聞乞成就謹辭上金五分本五兩素絲五兩本命紋繒年餘一合如干命米五斗薪一束右五種如法太上洞玄靈寶智慧定志通微經
